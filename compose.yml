services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command:
      - "--config=${OTEL_COLLECTOR_CONFIG:-/etc/otelcol/config.default.yaml}"
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./otel-collector/config.default.yaml:/etc/otelcol/config.default.yaml:ro
      - ./otel-collector/config.elk.yaml:/etc/otelcol/config.elk.yaml:ro

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    depends_on:
      - alertmanager
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-7d}"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

  grafana:
    image: grafana/grafana:11.1.4
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    ports:
      - "3200:3200"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.15.0}
    restart: unless-stopped
    profiles:
      - elk
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"

  elasticsearch-init:
    image: curlimages/curl:8.10.1
    restart: "no"
    profiles:
      - elk
    depends_on:
      - elasticsearch
    volumes:
      - ./elasticsearch/index-templates/otel-logs-template.json:/bootstrap/otel-logs-template.json:ro
      - ./elasticsearch/ilm-policies/otel-logs-ilm-policy.json:/bootstrap/otel-logs-ilm-policy.json:ro
    command:
      - sh
      - -ec
      - |
        until curl --fail --silent http://elasticsearch:9200 >/dev/null; do
          echo "Waiting for Elasticsearch..."
          sleep 5
        done
        curl --fail --silent --show-error -X PUT http://elasticsearch:9200/_ilm/policy/otel-logs-ilm-policy \
          -H 'Content-Type: application/json' \
          --data-binary @/bootstrap/otel-logs-ilm-policy.json
        curl --fail --silent --show-error -X PUT http://elasticsearch:9200/_index_template/otel-logs-template \
          -H 'Content-Type: application/json' \
          --data-binary @/bootstrap/otel-logs-template.json
        echo "Elasticsearch ILM policy and index template applied."

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.15.0}
    restart: unless-stopped
    profiles:
      - elk
    depends_on:
      - elasticsearch
      elasticsearch-init:
        condition: service_completed_successfully
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    ports:
      - "5601:5601"

  dotnet-example-api:
    build:
      context: ./examples/dotnet-minimal-api
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles:
      - examples
    depends_on:
      - otel-collector
    environment:
      ASPNETCORE_URLS: http://+:8080
      Observability__OtlpEndpoint: http://otel-collector:4317
      Observability__ServiceName: ${DOTNET_EXAMPLE_SERVICE_NAME:-observability-kit-example-api}
      Observability__Environment: ${DOTNET_EXAMPLE_ENVIRONMENT:-dev}
      OTEL_SERVICE_NAME: ${DOTNET_EXAMPLE_SERVICE_NAME:-observability-kit-example-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${DOTNET_EXAMPLE_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${DOTNET_EXAMPLE_ENVIRONMENT:-dev},service.namespace=a2g
    ports:
      - "8080:8080"
