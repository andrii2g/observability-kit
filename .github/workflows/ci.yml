name: CI

on:
  push:
  pull_request:

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate core compose config
        run: docker compose config
      - name: Validate ELK compose config
        run: OTEL_COLLECTOR_CONFIG=/etc/otelcol/config.elk.yaml docker compose --profile elk config

  build-dotnet-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Build .NET example
        run: dotnet build examples/dotnet-minimal-api/ObservabilityKit.Example.Api.csproj

  markdown-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install markdownlint
        run: npm install --global markdownlint-cli2
      - name: Lint Markdown
        run: markdownlint-cli2 "**/*.md"
